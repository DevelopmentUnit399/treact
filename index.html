<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treact</title>
    <script src="https://kit.fontawesome.com/66e0a4dc21.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav__container">
            <div class="row">
                <div class="header__logo">
                    <img src="assets/logo.2c489fc453a1783cbadacf914efa3df6.svg" class="header__logo--img" alt="">
                    <h2 class="header__title">Treact</h2>
                </div>

                <div class="nav">
                    <ul class="header__nav">
                        <li class="header__link">
                            <a href="">About</a>
                        </li>

                        <li class="header__link">
                            <a href="">Blog</a>
                        </li>

                        <li class="header__link">
                            <a href="">Pricing</a>
                        </li>

                        <li class="header__link">
                            <a href="" class="not-allowed">Contact Us</a>
                        </li>

                        <li class="header__link header__link--login">
                            <a href="" class="not-allowed">Login</a>
                        </li>

                        <button class="header__link header__link--main not-allowed">
                            <a href="" class="header__link--text not-allowed">Sign Up</a>
                        </button>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div id="home" class="container">
            <div class="row home__row">
                <div class="home__content">
                    <h1 class="home__title--text">Beautiful React Templates <span class="purple">for you.</span></h1>
                    <h2 class="home__title--desc">Our templates are easy to setup, understand and customize. Fully modular components with a variety of pages and components.</h2>

                    <form class="home__title--form">
                        <input
                            type="email"
                            placeholder="Your E-mail Address"
                            required
                            class="email-input"
                            />

                            <button type="" class="email-button">
                                Get Started
                            </button>
                    </form>

                    <div class="home__title--customers">
                        <p class="customers__desc"> Our Trusted Customers</p>
                        <img class="customers__img" src="assets/customers-logo-strip.680ac7c2e8ae28161d2c.png" alt="">
                    </div>
                </div>

                <div class="home__content--img">
                    <img class="home__img" src="assets/design-illustration-2.6da6a00b20c07c4a9b65d1870679e1b8.svg"
                </div>
            </div>
        </div>

        

    </main>
</body>
</html>
